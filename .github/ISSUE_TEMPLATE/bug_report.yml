name: Bug Report
description: Report a bug in spring-reactive-mongo-filter
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Library Version
      description: Which version of spring-reactive-mongo-filter are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java Version
      placeholder: "21"
    validations:
      required: true

  - type: input
    id: spring-boot-version
    attributes:
      label: Spring Boot Version
      placeholder: "4.0.4"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: java
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: stacktrace
    attributes:
      label: Stacktrace / Logs
      description: Paste any relevant error output.
      render: shell
    validations:
      required: false