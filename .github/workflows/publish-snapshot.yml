name: Publish SNAPSHOT to Maven Central

on:
  push:
    branches:
      - dev

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Determine SNAPSHOT version
        id: version
        run: |
          BASE_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          BASE_VERSION="${BASE_VERSION%-SNAPSHOT}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${BASE_VERSION}-SNAPSHOT" >> $GITHUB_OUTPUT

      - name: Set version in pom.xml
        run: |
          ./mvnw versions:set -DnewVersion="${VERSION}"
          ./mvnw versions:commit
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build, Sign, and Publish SNAPSHOT
        run: ./mvnw clean deploy -Prelease -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Summary
        run: |
          echo "## Published SNAPSHOT to Maven Central" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **GroupId:** de.magicthings" >> $GITHUB_STEP_SUMMARY
          echo "- **ArtifactId:** spring-reactive-mongo-filter" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY