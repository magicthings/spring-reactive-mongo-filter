name: Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.0)'
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.ref_type == 'tag'
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag must be created from the main branch"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github-magicthings</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-magicthings-entity-library</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            echo "VERSION=${INPUT_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Set version in pom.xml
        run: |
          ./mvnw versions:set -DnewVersion="${VERSION}"
          ./mvnw versions:commit
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build and Test
        run: ./mvnw clean verify
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Publish to GitHub Packages
        run: ./mvnw deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

      - name: Generate checksums
        run: |
          cd target
          for file in *.jar; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/spring-reactive-mongo-filter-*.jar
            target/spring-reactive-mongo-filter-*.jar.sha256

      - name: Summary
        run: |
          echo "## Published Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **GroupId:** de.magicthings" >> $GITHUB_STEP_SUMMARY
          echo "- **ArtifactId:** spring-reactive-mongo-filter" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY