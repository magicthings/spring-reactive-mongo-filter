name: Publish Release to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: github.ref_type == 'tag'
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag must be created from the main branch"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Determine version
        id: version
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            echo "VERSION=${INPUT_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}

      - name: Set version in pom.xml
        run: |
          ./mvnw versions:set -DnewVersion="${VERSION}"
          ./mvnw versions:commit
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build, Sign, and Publish to Maven Central
        run: ./mvnw clean deploy -Prelease -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Generate checksums
        run: |
          cd target
          for file in *.jar; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Delete existing GitHub Release if present
        if: github.ref_type == 'tag'
        run: gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag=false 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: |
            target/spring-reactive-mongo-filter-*.jar
            target/spring-reactive-mongo-filter-*.jar.sha256

      - name: Summary
        run: |
          echo "## Published to Maven Central" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **GroupId:** de.magicthings" >> $GITHUB_STEP_SUMMARY
          echo "- **ArtifactId:** spring-reactive-mongo-filter" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Available at: [Maven Central](https://central.sonatype.com/artifact/de.magicthings/spring-reactive-mongo-filter/${{ steps.version.outputs.VERSION }})" >> $GITHUB_STEP_SUMMARY